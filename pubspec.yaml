name: offgrid_messenger
description: "A disaster-proof, infrastructure-independent messaging application that works without internet, cellular networks, or Wi-Fi routers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  
  # Core dependencies (working versions)
  network_info_plus: ^7.0.0
  permission_handler: ^12.0.1
  
  # Database
  sqflite: ^2.3.0
  path_provider: ^2.1.0
  
  # Encryption
  pointycastle: ^4.0.0
  crypto: ^3.0.0
  
  # State Management
  provider: ^6.1.0
  
  # Background Services - temporarily disabled
  # flutter_background_service: ^5.0.0
  # workmanager: ^0.5.0
  
  # UI & UX - temporarily disabled problematic notification package
  # flutter_local_notifications: ^16.0.0
  
  # Utilities
  uuid: ^4.0.0
  intl: ^0.20.2
  shared_preferences: ^2.2.0
  
  # Icons
  cupertino_icons: ^1.0.8
  nearby_connections: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# Android-only configuration
flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/